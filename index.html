<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color Randomizer</title>

<style>

body{
  background:#222;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.wrap{
  position:relative;
  width:500px;
  margin:auto;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

button{
  margin-top:720px;
  padding:12px 24px;
  font-size:20px;
}

</style>
</head>

<body>

<h1>カラーシミュレーター</h1>

<div class="wrap">

<canvas id="inner"></canvas>
<canvas id="under"></canvas>
<canvas id="skin"></canvas>
<canvas id="glove"></canvas>
<canvas id="outer"></canvas>
<canvas id="outer2"></canvas>
<canvas id="eyelid"></canvas>
<canvas id="eye"></canvas>
<canvas id="hair"></canvas>
<canvas id="line"></canvas>

</div>

<button onclick="randomize()">
ランダム変更
</button>

<script>

const layers = {
  inner: "inner.png",
  under: "under.png",
  skin: "skin.png",
  glove: "glove.png",
  outer: "outer.png",
  outer2: "outer2.png",
  eyelid: "eyelid.png",
  eye: "eye.png",
  hair: "hair.png",
  line: "line.png"
};

const images = {};
const canvases = {};
const ctxs = {};

// 初期化
for(let key in layers){

  const img = new Image();
  img.src = layers[key];
  images[key] = img;

  const canvas = document.getElementById(key);
  const ctx = canvas.getContext("2d");

  canvases[key] = canvas;
  ctxs[key] = ctx;

  img.onload = () => {

    canvas.width = img.width;
    canvas.height = img.height;

    draw(key);
  };
}

/* -------------------------
   カラー生成
------------------------- */

// 黒寄り
function colorNearBlack(){

  return {
    h: Math.random()*360,
    s: 10 + Math.random()*20,
    l: 5 + Math.random()*12
  };
}

// 白寄り
function colorNearWhite(){

  return {
    h: Math.random()*360,
    s: 5 + Math.random()*10,
    l: 88 + Math.random()*10
  };
}

// ビビッド
function colorVivid(){

  return {
    h: Math.random()*360,
    s: 80 + Math.random()*20,
    l: 45 + Math.random()*15
  };
}

// 普通
function randomColor(){

  return {
    h: Math.random()*360,
    s: 40 + Math.random()*60,
    l: 35 + Math.random()*30
  };
}

/* -------------------------
   HSL → RGB
------------------------- */

function hslToRgb(h, s, l){

  s /= 100;
  l /= 100;

  const c = (1 - Math.abs(2*l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c/2;

  let r=0,g=0,b=0;

  if(h < 60){
    r=c; g=x; b=0;
  }
  else if(h < 120){
    r=x; g=c; b=0;
  }
  else if(h < 180){
    r=0; g=c; b=x;
  }
  else if(h < 240){
    r=0; g=x; b=c;
  }
  else if(h < 300){
    r=x; g=0; b=c;
  }
  else{
    r=c; g=0; b=x;
  }

  return {
    r: Math.round((r+m)*255),
    g: Math.round((g+m)*255),
    b: Math.round((b+m)*255)
  };
}

/* -------------------------
   色適用
------------------------- */

function applyColor(ctx, canvas, img, h, s, l){

  // 前回描画を消す
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 元画像描画
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(
    0,
    0,
    canvas.width,
    canvas.height
  );

  const d = imageData.data;

  const rgb = hslToRgb(h, s, l);

  for(let i = 0; i < d.length; i += 4){

    if(d[i+3] === 0) continue;

    // 元画像の明るさ
    const gray =
      (d[i] + d[i+1] + d[i+2]) / 3 / 255;

    d[i]   = rgb.r * gray;
    d[i+1] = rgb.g * gray;
    d[i+2] = rgb.b * gray;
  }

  ctx.putImageData(imageData, 0, 0);
}

/* -------------------------
   描画
------------------------- */

function draw(key, color){

  const ctx = ctxs[key];
  const canvas = canvases[key];
  const img = images[key];

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if(!color){

    ctx.drawImage(img, 0, 0);
    return;
  }

  applyColor(
    ctx,
    canvas,
    img,
    color.h,
    color.s,
    color.l
  );
}

/* -------------------------
   ランダム化
------------------------- */

function randomize(){

  draw("hair", randomColor());

  draw("eye", colorVivid());

  draw("inner", colorNearWhite());

  draw("outer", colorNearBlack());

  draw("under", colorNearBlack());

  draw("glove", colorNearBlack());

  draw("outer2", colorVivid());

  draw("skin");
  draw("eyelid");
  draw("line");
}

</script>

</body>
</html>
