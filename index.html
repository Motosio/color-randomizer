<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color Randomizer</title>

<style>

body{
  background:#222;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.wrap{
  position:relative;
  width:500px;
  margin:auto;
}

/* canvasを重ねる方式に変更 */
canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

.base{
  position:relative;
}

button{
  margin-top:20px;
  padding:12px 24px;
  font-size:20px;
}

</style>
</head>

<body>

<h1>カラーシミュレーター</h1>

<div class="wrap">

<canvas id="inner"></canvas>
<canvas id="under"></canvas>
<canvas id="skin"></canvas>
<canvas id="glove"></canvas>
<canvas id="outer"></canvas>
<canvas id="outer2"></canvas>
<canvas id="eyelid"></canvas>
<canvas id="eye"></canvas>
<canvas id="hair"></canvas>
<canvas id="line"></canvas>

</div>

<button onclick="randomize()">
ランダム変更
</button>

<script>

// 各レイヤー画像パス
const layers = {
  inner: "inner.png",
  under: "under.png",
  skin: "skin.png",
  glove: "glove.png",
  outer: "outer.png",
  outer2: "outer2.png",
  eyelid: "eyelid.png",
  eye: "eye.png",
  hair: "hair.png",
  line: "line.png"
};

const images = {};
const canvases = {};
const ctxs = {};

// 初期化
for (let key in layers){

  const img = new Image();
  img.src = layers[key];
  images[key] = img;

  const canvas = document.getElementById(key);
  const ctx = canvas.getContext("2d");

  canvases[key] = canvas;
  ctxs[key] = ctx;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    draw(key);
  };
}

function randomColor(){

  return {
    h: Math.random()*360,
    s: 40 + Math.random()*60,
    l: 35 + Math.random()*30
  };
}

/* ---------------------------
   RGB置換の核
----------------------------*/
function applyColor(ctx, canvas, img, h, s, l){

  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(
    0, 0,
    canvas.width,
    canvas.height
  );

  const d = imageData.data;

  for (let i = 0; i < d.length; i += 4){

    // 透明は無視
    if (d[i + 3] === 0) continue;

    // グレースケール化（重要）
    const gray =
      d[i]*0.3 +
      d[i+1]*0.59 +
      d[i+2]*0.11;

    // RGB再構築（擬似色付け）
    d[i]   = gray * (h/360);
    d[i+1] = gray * (s/100);
    d[i+2] = gray * (l/100);
  }

  ctx.putImageData(imageData, 0, 0);
}

/* 描画 */
function draw(key, color){

  const ctx = ctxs[key];
  const canvas = canvases[key];
  const img = images[key];

  if (!color){

    ctx.drawImage(img, 0, 0);
    return;
  }

  applyColor(ctx, canvas, img, color.h, color.s, color.l);
}

/* ランダム生成 */
function randomize(){

  const hair  = randomColor();
  const eye   = randomColor();
  const inner = randomColor();
  const outer = randomColor();
  const under = randomColor();
  const glove = randomColor();

  draw("hair", hair);
  draw("eye", eye);
  draw("inner", inner);
  draw("outer", outer);
  draw("outer2", {
    h: outer.h,
    s: outer.s * 0.7,
    l: outer.l + 15
  });
  draw("under", under);
  draw("glove", glove);

  // 固定レイヤー
  draw("skin");
  draw("eyelid");
  draw("line");
}

</script>

</body>
</html>
