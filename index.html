<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color Randomizer</title>

<style>

body{
  background:#222;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.wrap{
  position:relative;
  width:500px;
  margin:auto;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

button{
  margin-top:720px;
  padding:12px 24px;
  font-size:20px;
}

</style>
</head>

<body>

<h1>カラーシミュレーター</h1>

<div class="wrap">

<canvas id="inner"></canvas>
<canvas id="under"></canvas>
<canvas id="skin"></canvas>
<canvas id="glove"></canvas>
<canvas id="outer"></canvas>
<canvas id="outer2"></canvas>
<canvas id="eyelid"></canvas>
<canvas id="eye"></canvas>
<canvas id="hair"></canvas>
<canvas id="line"></canvas>

</div>

<button onclick="randomize()">
ランダム変更
</button>

<script>

// レイヤー画像
const layers = {
  inner: "inner.png",
  under: "under.png",
  skin: "skin.png",
  glove: "glove.png",
  outer: "outer.png",
  outer2: "outer2.png",
  eyelid: "eyelid.png",
  eye: "eye.png",
  hair: "hair.png",
  line: "line.png"
};

const images = {};
const canvases = {};
const ctxs = {};

// 初期化
for (let key in layers){

  const img = new Image();
  img.src = layers[key];
  images[key] = img;

  const canvas = document.getElementById(key);
  const ctx = canvas.getContext("2d");

  canvases[key] = canvas;
  ctxs[key] = ctx;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    draw(key);
  };
}

/* ---------------------------
   完全RGB塗りつぶし
----------------------------*/
function applyColor(ctx, canvas, img, r, g, b){

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(
    0, 0,
    canvas.width,
    canvas.height
  );

  const d = imageData.data;

  for (let i = 0; i < d.length; i += 4){

    // 透明は無視
    if (d[i + 3] === 0) continue;

    // ★ここが本体：完全上書き
    d[i]   = r;
    d[i+1] = g;
    d[i+2] = b;
  }

  ctx.putImageData(imageData, 0, 0);
}

/* 描画 */
function draw(key, color){

  const ctx = ctxs[key];
  const canvas = canvases[key];
  const img = images[key];

  if (!color){
    ctx.drawImage(img, 0, 0);
    return;
  }

  applyColor(ctx, canvas, img, color.r, color.g, color.b);
}

/* ランダムRGB */
function randomRGB(){
  return {
    r: Math.floor(Math.random()*256),
    g: Math.floor(Math.random()*256),
    b: Math.floor(Math.random()*256)
  };
}

/* ランダム変更 */
function randomize(){

  const hair  = randomRGB();
  const eye   = randomRGB();
  const inner = randomRGB();
  const outer = randomRGB();
  const under = randomRGB();
  const glove = randomRGB();

  draw("hair", hair);
  draw("eye", eye);
  draw("inner", inner);
  draw("outer", outer);

  // outer2はouter派生（少し明るく）
  draw("outer2", {
    r: Math.min(255, outer.r + 40),
    g: Math.min(255, outer.g + 40),
    b: Math.min(255, outer.b + 40)
  });

  draw("under", under);
  draw("glove", glove);

  // 固定
  draw("skin", {r:255,g:220,b:200});
  draw("eyelid", {r:255,g:255,b:255});
  draw("line", {r:0,g:0,b:0});
}

</script>

</body>
</html>
