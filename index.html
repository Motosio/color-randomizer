<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color Randomizer</title>

<style>
body{
  background:#222;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.wrap{
  position:relative;
  width:500px;
  margin:auto;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

button{
  margin-top:720px;
  padding:12px 24px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>カラーシミュレーター</h1>

<div class="wrap">

<canvas id="inner"></canvas>
<canvas id="under"></canvas>
<canvas id="skin"></canvas>
<canvas id="glove"></canvas>
<canvas id="outer"></canvas>
<canvas id="outer2"></canvas>
<canvas id="eyelid"></canvas>
<canvas id="eye"></canvas>
<canvas id="hair"></canvas>
<canvas id="line"></canvas>

</div>

<button onclick="randomize()">ランダム変更</button>

<script>

const layers = {
  inner: "inner.png",
  under: "under.png",
  skin: "skin.png",
  glove: "glove.png",
  outer: "outer.png",
  outer2: "outer2.png",
  eyelid: "eyelid.png",
  eye: "eye.png",
  hair: "hair.png",
  line: "line.png"
};

const images = {};
const canvases = {};
const ctxs = {};

// 初期化
for (let key in layers){

  const img = new Image();
  img.src = layers[key];
  images[key] = img;

  const canvas = document.getElementById(key);
  const ctx = canvas.getContext("2d");

  canvases[key] = canvas;
  ctxs[key] = ctx;

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    draw(key);
  };
}

/* ---------------------------
   レイヤー別カラー生成
----------------------------*/

// 限りなく黒
function colorNearBlack(){
  return {
    h: Math.random()*360,
    s: 5 + Math.random()*20,
    l: 0 + Math.random()*15
  };
}

// 限りなく白
function colorNearWhite(){
  return {
    h: Math.random()*360,
    s: 0 + Math.random()*10,
    l: 85 + Math.random()*15
  };
}

// ビビッド（少しだけ黒寄り）
function colorVivid(){
  return {
    h: Math.random()*360,
    s: 80 + Math.random()*20,
    l: 40 + Math.random()*20
  };
}

// 通常ランダム
function randomColor(){
  return {
    h: Math.random()*360,
    s: 40 + Math.random()*60,
    l: 35 + Math.random()*30
  };
}

/* ---------------------------
   色適用処理
----------------------------*/
function applyColor(ctx, canvas, img, h, s, l){

  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imageData.data;

  for (let i = 0; i < d.length; i += 4){

    if (d[i + 3] === 0) continue;

    const gray =
      d[i]*0.3 +
      d[i+1]*0.59 +
      d[i+2]*0.11;

    d[i]   = gray * (h/360);
    d[i+1] = gray * (s/100);
    d[i+2] = gray * (l/100);
  }

  ctx.putImageData(imageData, 0, 0);
}

function draw(key, color){

  const ctx = ctxs[key];
  const canvas = canvases[key];
  const img = images[key];

  if (!color){
    ctx.drawImage(img, 0, 0);
    return;
  }

  applyColor(ctx, canvas, img, color.h, color.s, color.l);
}

/* ---------------------------
   ランダム適用（レイヤー別制御）
----------------------------*/
function randomize(){

  draw("hair", randomColor());
  draw("eye", randomColor());

  draw("inner", colorNearWhite());

  draw("outer", colorNearBlack());
  draw("under", colorNearBlack());
  draw("glove", colorNearBlack());

  draw("outer2", colorVivid());

  draw("skin");
  draw("eyelid");
  draw("line");
}

</script>

</body>
</html>
