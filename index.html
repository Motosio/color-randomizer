<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Color Randomizer</title>

<style>

body{
  background:#222;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.wrap{
  position:relative;
  width:500px;
  margin:auto;
}

.layer{
  position:absolute;
  top:0;
  left:0;
  width:100%;
}

.base{
  position:relative;
}

button{
  margin-top:20px;
  padding:12px 24px;
  font-size:20px;
}

</style>
</head>

<body>

<h1>カラーシミュレーター</h1>

<div class="wrap">

<img src="inner.png" class="layer" id="inner">
<img src="under.png" class="layer" id="under">
<img src="skin.png" class="base layer">
<img src="glove.png" class="layer" id="glove">
<img src="outer.png" class="layer" id="outer">
<img src="outer2.png" class="layer" id="outer2">
<img src="eyelid.png" class="layer" id="eyelid">
<img src="eye.png" class="layer" id="eye">
<img src="hair.png" class="layer" id="hair">
<img src="line.png" class="layer">

</div>

<button onclick="randomize()">
ランダム変更
</button>

<script>

function randomColor(){

  const h = Math.random()*360;
  const s = 40 + Math.random()*60;
  const l = 35 + Math.random()*30;

  return {
    h,s,l
  };
}

function setColor(id, h, s, l){

  const el = document.getElementById(id);

  el.style.filter =
    `hue-rotate(${h}deg)
     saturate(${s}%)
     brightness(${l + 50}%)`;
}

function randomize(){

  const hair = randomColor();
  const inner = randomColor();
  const outer = randomColor();
  const under = randomColor();
  const glove = randomColor();

  setColor(
    "haireye",
    hair.h,
    hair.s,
    hair.l
  );

  setColor(
    "inner",
    inner.h,
    inner.s,
    inner.l
  );

  setColor(
    "outer",
    outer.h,
    outer.s,
    outer.l
  );

  // outer2
  // 彩度低め・少し明るめ

  setColor(
    "outer2",
    outer.h,
    outer.s * 0.7,
    outer.l + 10
  );

  setColor(
    "under",
    under.h,
    under.s,
    under.l
  );

  setColor(
    "glove",
    glove.h,
    glove.s,
    glove.l
  );
}

</script>

</body>
</html>
